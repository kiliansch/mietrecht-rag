server {
    listen 80;

    # Must exceed MAX_UPLOAD_BYTES (10 MB) or contract uploads die at nginx
    # with an opaque 413 before reaching the API's own size check.
    client_max_body_size 12m;

    # API reverse proxy. proxy_buffering off + long read timeout are load-bearing
    # for the SSE chat/review streams.
    location /api {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # SPA fallback: unknown paths render index.html.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }
}
